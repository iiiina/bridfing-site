name: Update Briefing

on:
  schedule:
    - cron: '0 0 * * *'  # 하루 1번 실행 (UTC 기준)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 실행
        run: python bot.py

      - name: 변경사항 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update briefing"
          git push
